    body {

    /* Google Autocomplete Styles adjustment */
    .pac-container {
      border-radius: 0.5rem;
      margin-top: 4px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);

      font-family: 'Inter', sans-serif;
    }

    .pac-item {
      padding: 8px 12px;
      cursor: pointer;
    }

    .pac-item:hover {
      background-color: #f8fafc;
    }
  </style>
